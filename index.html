<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Amakha Paris 360</title>
    <style>
        :root {
            --primary-text: #1d1d1f;
            --secondary-text: #86868b;
            --accent-color: #007aff;
            --danger-color: #ff3b30;
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --border-color: #e5e5ea;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 20px; 
            background: var(--bg-color); 
            color: var(--primary-text);
            margin: 0;
        }

        .admin-container {
            max-width: 650px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
        }

        header p {
            color: var(--secondary-text);
            font-size: 14px;
            margin: 0;
        }

        .admin-box { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: 16px; 
            margin-bottom: 24px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
            border: 1px solid var(--border-color);
        }

        h2 { 
            font-size: 18px;
            font-weight: 600;
            margin-top: 0; 
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label { 
            font-size: 13px; 
            color: var(--secondary-text); 
            font-weight: 600; 
            display: block; 
            margin-bottom: 6px; 
        }

        input { 
            padding: 12px; 
            width: 100%; 
            box-sizing: border-box; 
            font-size: 15px; 
            border-radius: 10px; 
            border: 1px solid var(--border-color); 
            background: #fafafa;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            background: #fff;
        }

        button { 
            padding: 14px; 
            width: 100%; 
            box-sizing: border-box; 
            font-size: 15px; 
            border-radius: 12px;
            background: var(--accent-color); 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: 600; 
            transition: background 0.2s, transform 0.1s; 
        }

        button:active { 
            transform: scale(0.98); 
        }

        /* Vista previa de la foto */
        .preview-box { 
            display: none; 
            text-align: center; 
            margin: 15px 0; 
            padding: 12px; 
            border: 1px dashed var(--accent-color); 
            border-radius: 10px; 
            background: #f0f7ff; 
        }
        .preview-box img { 
            max-width: 100px; 
            max-height: 100px; 
            object-fit: cover; 
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
        }

        /* Lista de inventario */
        .perfume-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 14px 0; 
            border-bottom: 1px solid var(--border-color); 
        }
        
        .perfume-item:last-child {
            border-bottom: none;
        }

        .perfume-item img { 
            width: 52px; 
            height: 52px; 
            object-fit: cover; 
            border-radius: 8px; 
            margin-right: 14px; 
            background: #f5f5f7; 
        }
        
        .info-container { 
            display: flex; 
            align-items: center; 
        }

        .info-details strong {
            font-size: 15px;
        }

        .info-details p {
            margin: 3px 0 0 0;
            font-size: 13px;
            color: var(--secondary-text);
        }

        .actions { 
            display: flex; 
            gap: 6px; 
        }

        .actions button { 
            width: auto; 
            padding: 8px 12px; 
            margin: 0; 
            font-size: 13px; 
            border-radius: 8px;
        }

        .btn-inc { background: #e5e5ea; color: var(--primary-text); }
        .btn-inc:hover { background: #d1d1d6; }
        
        .btn-dec { background: #e5e5ea; color: var(--primary-text); }
        .btn-dec:hover { background: #d1d1d6; }

        .btn-delete { background: var(--danger-color); }
        .btn-delete:hover { background: #d9261c; }

        @media (max-width: 600px) {
            .perfume-item { flex-direction: column; align-items: flex-start; }
            .perfume-item div:last-child { margin-top: 12px; width: 100%; }
            .actions button { flex: 1; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <header>
            <h1>Amakha Paris 360</h1>
            <p>Panel de Administración y Control de Stock</p>
        </header>

        <!-- Formulario de ingreso -->
        <div class="admin-box">
            <h2>Añadir Nuevo Perfume</h2>
            
            <div class="form-group">
                <label>Nombre del Perfume</label>
                <input type="text" id="nombre" placeholder="Ej: Fragancia Masculina Amakha" required>
            </div>
            
            <div class="form-group">
                <label>Precio de Venta ($)</label>
                <input type="number" id="precio" placeholder="Ej: 450" required>
            </div>
            
            <div class="form-group">
                <label>Cantidad Inicial en Stock</label>
                <input type="number" id="stock" placeholder="Ej: 10" required>
            </div>
            
            <div class="form-group">
                <label>Enlace Directo de la Imagen (ImgBB)</label>
                <input type="text" id="fotoUrl" placeholder="Debe ser la URL completa que termina en .jpg o .png" required>
            </div>
            
            <!-- Contenedor Vista Previa en Vivo -->
            <div class="preview-box" id="preview-box">
                <p style="font-size: 11px; margin-bottom: 6px; color: var(--accent-color); font-weight: 600;">Vista previa de la imagen:</p>
                <img id="img-live-preview" src="" alt="Previsualización">
            </div>
            
            <button id="btn-add">Guardar en Catálogo</button>
        </div>

        <!-- Lista de Inventario -->
        <div class="admin-box">
            <h2>Inventario Actual (Tiempo Real)</h2>
            <div id="inventory-list">Cargando inventario conectado...</div>
        </div>
    </div>

    <!-- SDK de Firebase Realtime Database v10 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Configuración exacta sincronizada con tu catálogo
        const firebaseConfig = {
            apiKey: "AIzaSyDtT22MM01MGoNosSBNHEdvKQlGu8ghIBQ",
            authDomain: "inventario-de-local.firebaseapp.com",
            databaseURL: "https://inventario-de-local-default-rtdb.firebaseio.com",
            projectId: "inventario-de-local",
            storageBucket: "inventario-de-local.firebasestorage.app",
            messagingSenderId: "535105215340",
            appId: "1:535105215340:web:47fcd308f64297b1c23149"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const perfumesRef = ref(db, "perfumes");

        // Escuchador de la URL para activar la previsualización de la foto antes de guardarla
        document.getElementById('fotoUrl').addEventListener('input', (e) => {
            const url = e.target.value.trim();
            const previewBox = document.getElementById('preview-box');
            const imgPreview = document.getElementById('img-live-preview');
            
            if (url) {
                imgPreview.src = url;
                previewBox.style.display = 'block';
            } else {
                previewBox.style.display = 'none';
            }
        });

        // Guardar perfume nuevo en la base de datos
        document.getElementById('btn-add').addEventListener('click', async () => {
            const nombre = document.getElementById('nombre').value.trim();
            const precio = Number(document.getElementById('precio').value);
            const stock = Number(document.getElementById('stock').value);
            const fotoUrl = document.getElementById('fotoUrl').value.trim();

            if (nombre && precio >= 0 && stock >= 0 && fotoUrl) {
                
                // Validación para advertir si copiaste el enlace erróneo de la página web de ImgBB
                if (fotoUrl.includes('imgbb.com') && !fotoUrl.includes('i.ibb.co')) {
                    alert("⚠️ ¡Atención! El enlace ingresado parece ser el link del visor web de ImgBB y no la 'URL de la imagen'. Asegúrate de usar el link directo que termina en .jpg o .png para que tus clientes puedan visualizarlo.");
                }

                try {
                    await push(perfumesRef, { nombre, precio, stock, fotoUrl });
                    alert("¡Perfume ingresado correctamente!");
                    
                    // Resetear formulario
                    document.getElementById('nombre').value = '';
                    document.getElementById('precio').value = '';
                    document.getElementById('stock').value = '';
                    document.getElementById('fotoUrl').value = '';
                    document.getElementById('preview-box').style.display = 'none';
                } catch (error) {
                    alert("Error al subir los datos: " + error.message);
                }
            } else {
                alert("Por favor, rellena todos los casilleros con datos válidos.");
            }
        });

        // Escuchar cambios globales (Tus modificaciones manuales o compras de clientes)
        onValue(perfumesRef, (snapshot) => {
            const inventoryList = document.getElementById('inventory-list');
            inventoryList.innerHTML = '';

            if (!snapshot.exists()) {
                inventoryList.innerHTML = '<p style="text-align:center; color:var(--secondary-text); margin: 10px 0;">No tienes artículos en tu inventario actual.</p>';
                return;
            }

            const data = snapshot.val();

            Object.keys(data).forEach((id) => {
                const perfume = data[id];
                
                // Muestra un marcador de error visual elegante si el link guardado estuviera dañado
                const imgTag = perfume.fotoUrl ? `<img src="${perfume.fotoUrl}" alt="" onerror="this.onerror=null; this.src='https://via.placeholder.com/50?text=Error';">` : `<div style="width:52px; height:52px; background:#ccc; margin-right:14px; border-radius:8px;"></div>`;

                const item = document.createElement('div');
                item.className = 'perfume-item';
                item.innerHTML = `
                    <div class="info-container">
                        ${imgTag}
                        <div class="info-details">
                            <strong>${perfume.nombre}</strong>
                            <p>Precio: $${perfume.precio} | Stock: <b style="color:${perfume.stock === 0 ? 'red' : 'inherit'};">${perfume.stock} u.</b></p>
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn-inc" data-id="${id}" data-stock="${perfume.stock}">+1</button>
                        <button class="btn-dec" data-id="${id}" data-stock="${perfume.stock}">-1</button>
                        <button class="btn-delete" data-id="${id}">Borrar</button>
                    </div>
                `;
                inventoryList.appendChild(item);
            });

            // Sincronizadores manuales para los botones de control de stock
            document.querySelectorAll('.btn-inc').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    const currentStock = Number(e.target.getAttribute('data-stock'));
                    await update(ref(db, `perfumes/${id}`), { stock: currentStock + 1 });
                });
            });

            document.querySelectorAll('.btn-dec').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    const currentStock = Number(e.target.getAttribute('data-stock'));
                    if (currentStock > 0) {
                        await update(ref(db, `perfumes/${id}`), { stock: currentStock - 1 });
                    }
                });
            });

            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    if (confirm("¿Estás completamente seguro de que deseas remover este perfume del catálogo general?")) {
                        await remove(ref(db, `perfumes/${id}`));
                    }
                });
            });
        }, (error) => {
            document.getElementById('inventory-list').innerHTML = `<p style="color:red; text-align:center;">Fallo de enlace con Firebase: ${error.message}</p>`;
        });
    </script>
</body>
</html>

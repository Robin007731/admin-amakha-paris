<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Panel de Control - Fragancias360</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-text: #ffffff;
            --secondary-text: #a1a1a6;
            --accent-gold: #fee082;
            --accent-gold-dark: #d4af37;
            --bg-gradient: linear-gradient(135deg, #09090b 0%, #121214 100%);
            --card-bg: rgba(22, 22, 26, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(255, 255, 255, 0.04);
        }
        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--primary-text);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 selection:bg-amber-500 selection:text-black">

    <div class="max-w-6xl mx-auto space-y-8">
        
        <header class="flex flex-col md:flex-row md:items-center md:justify-between border-b border-zinc-800 pb-6 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-amber-200 via-amber-400 to-amber-600 bg-clip-text text-transparent">Fragancias360</h1>
                <p class="text-zinc-400 text-sm mt-1">Consola Central de Gestión de Inventario & Control Operativo</p>
            </div>
        </header>

        <div class="bg-zinc-900/50 border border-zinc-800/80 rounded-2xl p-6 backdrop-blur-md">
            <h2 id="form-title" class="text-xl font-bold text-white mb-4">Agregar Nuevo Perfume</h2>
            
            <form id="perfume-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 mb-1">Nombre Completo de la Fragancia</label>
                        <input type="text" id="p-nombre" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-amber-400">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 mb-1">Género / Clasificación</label>
                        <select id="p-genero" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-amber-400">
                            <option value="Masculino">Masculino</option>
                            <option value="Femenino">Femenino</option>
                            <option value="Unisex">Unisex</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 mb-1">Precio (en pesos $)</label>
                        <input type="number" id="p-precio" required min="0" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-amber-400">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 mb-1">Unidades Disponibles (Stock)</label>
                        <input type="number" id="p-stock" required min="0" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-amber-400">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-zinc-400 mb-1">URL Directa de la Fotografía del Perfume</label>
                    <input type="url" id="p-foto" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-amber-400" placeholder="https://ejemplo.com/imagen.jpg">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-zinc-400 mb-1">Ficha Informativa / Descripción Detallada</label>
                    <textarea id="p-descripcion" rows="3" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-amber-400" placeholder="Escribe notas aromáticas, familia olfativa, duración promedio, etc."></textarea>
                </div>

                <div class="flex gap-3 pt-2">
                    <button type="submit" id="btn-submit" class="flex-1 bg-amber-400 hover:bg-amber-500 text-black font-bold text-sm py-3 px-4 rounded-xl transition-all shadow-lg shadow-amber-500/10">Guardar Perfume</button>
                    <button type="button" id="btn-cancel" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-300 font-medium text-sm py-3 px-5 rounded-xl transition-all hidden">Cancelar</button>
                </div>
            </form>
        </div>

        <div class="space-y-4">
            <div class="flex flex-col sm:flex-row gap-4 items-center justify-between bg-zinc-900/30 p-4 rounded-xl border border-zinc-800/60">
                <h3 class="text-lg font-bold text-white">Inventario en Tiempo Real</h3>
                
                <div class="flex flex-col sm:flex-row gap-2 w-full sm:w-auto">
                    <input type="text" id="admin-search-bar" placeholder="Buscar por marca o nombre..." class="bg-zinc-950 border border-zinc-800 text-zinc-300 text-xs rounded-xl px-4 py-2 focus:outline-none focus:border-amber-400 w-full sm:w-64">
                    <select id="admin-genre-filter" class="bg-zinc-950 border border-zinc-800 text-zinc-300 text-xs rounded-xl px-3 py-2 focus:outline-none">
                        <option value="Todos">Todos los Géneros</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                        <option value="Unisex">Unisex</option>
                    </select>
                </div>
            </div>

            <div id="admin-inventory-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <p class="text-zinc-500 text-xs py-4 text-center col-span-full">Sincronizando con base de datos remota...</p>
            </div>
        </div>

        <section class="bg-zinc-950 border border-purple-900/40 rounded-2xl p-6 shadow-xl shadow-purple-950/5">
            <div class="flex items-center gap-3 mb-4 border-b border-zinc-800 pb-3">
                <div class="w-3 h-3 bg-purple-500 rounded-full animate-pulse"></div>
                <h2 class="text-xl font-bold tracking-tight text-purple-300">📌 Panel General de Pedidos Reservados</h2>
            </div>
            
            <div id="contenedor-reservas" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-zinc-500 text-sm col-span-full">No hay pedidos bajo reserva registrados de momento.</p>
            </div>
        </section>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, runTransaction, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtT22MM01MGoNosSBNHEdvKQlGu8ghIBQ",
            authDomain: "inventario-de-local.firebaseapp.com",
            databaseURL: "https://inventario-de-local-default-rtdb.firebaseio.com",
            projectId: "inventario-de-local",
            storageBucket: "inventario-de-local.firebasestorage.app",
            messagingSenderId: "535105215340",
            appId: "1:535105215340:web:47fcd308f64297b1c23149"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const perfumesRef = ref(db, "perfumes");
        const reservasRef = ref(db, "reservas");

        let rawInventory = {};
        let currentEditingId = null;
        let currentSearchQuery = "";
        let currentGenreFilter = "Todos";

        const perfumeForm = document.getElementById('perfume-form');
        const formTitle = document.getElementById('form-title');
        const btnSubmit = document.getElementById('btn-submit');
        const btnCancel = document.getElementById('btn-cancel');

        const inputNombre = document.getElementById('p-nombre');
        const inputGenero = document.getElementById('p-genero');
        const inputPrecio = document.getElementById('p-precio');
        const inputStock = document.getElementById('p-stock');
        const inputFoto = document.getElementById('p-foto');
        const inputDescripcion = document.getElementById('p-descripcion');

        perfumeForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const perfumeId = currentEditingId ? currentEditingId : 'id_' + Date.now();
            const payload = {
                nombre: inputNombre.value.trim(),
                genero: inputGenero.value,
                precio: parseInt(inputPrecio.value),
                stock: parseInt(inputStock.value),
                fotoUrl: inputFoto.value.trim(),
                descripcion: inputDescripcion.value.trim()
            };

            set(ref(db, `perfumes/${perfumeId}`), payload)
                .then(() => {
                    resetearFormulario();
                })
                .catch(err => console.error("Error al persistir cambios", err));
        });

        onValue(perfumesRef, (snapshot) => {
            if (!snapshot.exists()) {
                document.getElementById('admin-inventory-list').innerHTML = '<p class="text-zinc-500 text-xs py-4 text-center col-span-full">No existen registros en el sistema.</p>';
                rawInventory = {};
                return;
            }
            rawInventory = snapshot.val();
            renderFilteredInventory();
        });

        // ESCUCHADOR REAL-TIME DE RESERVAS ACTUALIZADO
        onValue(reservasRef, (snapshot) => {
            const contenedorReservas = document.getElementById('contenedor-reservas');
            contenedorReservas.innerHTML = '';

            if (!snapshot.exists()) {
                contenedorReservas.innerHTML = '<p class="text-zinc-500 text-sm col-span-full py-2">No hay pedidos bajo reserva registrados de momento.</p>';
                return;
            }

            const datosReservas = snapshot.val();
            Object.keys(datosReservas).forEach((idReserva) => {
                const reserva = datosReservas[idReserva];
                const fechaLegible = new Date(reserva.fecha).toLocaleString();

                // Extraer información detallada del cliente si existe
                const clienteNombre = reserva.cliente || "Cliente No Registrado";
                const clienteTelefono = reserva.telefono || "Sin Teléfono";

                let productosHtml = '';
                
                // Evaluar si los datos vienen estructurados como array (index_3.html) o como objeto antiguo
                if (reserva.items && Array.isArray(reserva.items)) {
                    reserva.items.forEach(item => {
                        productosHtml += `
                            <li class="flex justify-between items-center bg-zinc-950/50 p-2 rounded-lg border border-zinc-800/40 text-xs">
                                <span class="text-zinc-100 font-medium">${item.nombre}</span>
                                <span class="text-purple-300 font-bold bg-purple-950/60 px-2 py-0.5 rounded border border-purple-900/40">Cant: ${item.cantidad}</span>
                            </li>
                        `;
                    });
                } else if (reserva.perfumeNombre) {
                    productosHtml = `
                        <li class="flex justify-between items-center bg-zinc-950/50 p-2 rounded-lg border border-zinc-800/40 text-xs">
                            <span class="text-zinc-100 font-medium">${reserva.perfumeNombre}</span>
                            <span class="text-purple-300 font-bold bg-purple-950/60 px-2 py-0.5 rounded border border-purple-900/40">Cant: ${reserva.cantidad || 1}</span>
                        </li>
                    `;
                }

                const cajaReserva = document.createElement('div');
                cajaReserva.className = "bg-zinc-900/60 border border-purple-900/30 rounded-xl p-4 flex flex-col justify-between space-y-3 shadow-md";
                cajaReserva.innerHTML = `
                    <div>
                        <div class="flex items-center justify-between border-b border-zinc-800/80 pb-2">
                            <span class="text-[11px] text-zinc-400 font-mono">${fechaLegible}</span>
                            <select onchange="window.amp_actualizarEstadoReserva('${idReserva}', this.value)" class="bg-purple-950 text-purple-300 border border-purple-800/60 text-[11px] font-bold px-2 py-0.5 rounded focus:outline-none cursor-pointer">
                                <option value="Pendiente" ${reserva.estado === 'Pendiente' ? 'selected' : ''}>Pendiente</option>
                                <option value="Completado" ${reserva.estado === 'Completado' ? 'selected' : ''}>Completado</option>
                                <option value="Cancelado" ${reserva.estado === 'Cancelado' ? 'selected' : ''}>Cancelado</option>
                            </select>
                        </div>
                        <div class="mt-2 text-xs space-y-0.5 bg-zinc-950/30 p-2 rounded-lg border border-zinc-800/50">
                            <p class="text-zinc-300"><span class="text-zinc-500">Comprador:</span> <strong class="text-amber-200">${clienteNombre}</strong></p>
                            <p class="text-zinc-300"><span class="text-zinc-500">Contacto:</span> <span class="text-zinc-400 font-mono">${clienteTelefono}</span></p>
                        </div>
                        <ul class="mt-3 space-y-1.5">
                            ${productosHtml}
                        </ul>
                    </div>
                    <div class="border-t border-zinc-800/60 pt-2 flex flex-col space-y-2">
                        <div class="flex items-center justify-between text-xs">
                            <span class="text-zinc-400">${reserva.metodoEntrega}</span>
                            <span class="text-amber-300 font-extrabold text-sm">$${reserva.total}</span>
                        </div>
                        <button onclick="window.amp_eliminarReserva('${idReserva}')" class="w-full text-center bg-zinc-950 hover:bg-red-950/30 text-zinc-500 hover:text-red-400 text-[10px] py-1 rounded border border-zinc-900 transition-colors">
                            Archivar Pedido
                        </button>
                    </div>
                `;
                contenedorReservas.appendChild(cajaReserva);
            });
        });

        // Cambiar el estado de la reserva en Firebase
        window.amp_actualizarEstadoReserva = function(idReserva, nuevoEstado) {
            update(ref(db, `reservas/${idReserva}`), { estado: nuevoEstado })
                .catch(err => console.error("Error al actualizar estado de la reserva:", err));
        };

        // Eliminar/Archivar la reserva de la base de datos
        window.amp_eliminarReserva = function(idReserva) {
            if (confirm("¿Estás seguro de que deseas archivar/eliminar esta reserva permanentemente del sistema?")) {
                remove(ref(db, `reservas/${idReserva}`)).catch(err => console.error(err));
            }
        };

        function renderFilteredInventory() {
            const container = document.getElementById('admin-inventory-list');
            container.innerHTML = '';

            const keys = Object.keys(rawInventory);
            let totalMostrado = 0;

            keys.forEach(id => {
                const item = rawInventory[id];
                const matchesSearch = item.nombre.toLowerCase().includes(currentSearchQuery.toLowerCase());
                const matchesGenre = currentGenreFilter === "Todos" || item.genero === currentGenreFilter;

                if (matchesSearch && matchesGenre) {
                    totalMostrado++;
                    const itemCard = document.createElement('div');
                    itemCard.className = "bg-zinc-900/40 border border-zinc-800 rounded-xl p-4 flex flex-col justify-between";
                    
                    const itemStockColor = item.stock === 0 ? 'text-red-400 font-bold bg-red-950/40' : 'text-zinc-300 bg-zinc-950';

                    itemCard.innerHTML = `
                        <div>
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-[10px] font-bold uppercase tracking-wider text-zinc-500">${item.genero}</span>
                                <span class="text-xs px-2 py-1 rounded border border-zinc-800 ${itemStockColor}">Stock: ${item.stock} u.</span>
                            </div>
                            <h4 class="text-sm font-bold text-white mb-1 truncate">${item.nombre}</h4>
                            <p class="text-xs text-amber-300 font-bold mb-3">$${item.precio}</p>
                        </div>
                        <div class="flex items-center gap-2 border-t border-zinc-800/60 pt-3">
                            <button onclick="window.amp_editPerfume('${id}')" class="flex-1 bg-zinc-800 hover:bg-zinc-700 text-white text-xs font-semibold py-2 rounded-lg transition-all">Editar</button>
                            <button onclick="window.amp_deletePerfume('${id}')" class="bg-red-950/40 hover:bg-red-900/40 text-red-400 border border-red-900/50 text-xs font-semibold py-2 px-3 rounded-lg transition-all">Eliminar</button>
                            <div class="flex flex-col gap-1">
                                <button onclick="window.amp_quickStock('${id}', 1)" class="bg-zinc-950 border border-zinc-800 text-white font-black text-xs px-2.5 py-0.5 rounded hover:bg-zinc-800">+</button>
                                <button onclick="window.amp_quickStock('${id}', -1)" class="bg-zinc-950 border border-zinc-800 text-white font-black text-xs px-2.5 py-0.5 rounded hover:bg-zinc-800">-</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(itemCard);
                }
            });

            if (totalMostrado === 0) {
                container.innerHTML = '<p class="text-zinc-500 text-xs py-4 text-center col-span-full">Ningún perfume coincide con los filtros aplicados.</p>';
            }
        }

        window.amp_editPerfume = function(id) {
            currentEditingId = id;
            const item = rawInventory[id];
            if (!item) return;

            inputNombre.value = item.nombre;
            inputGenero.value = item.genero;
            inputPrecio.value = item.precio;
            inputStock.value = item.stock;
            inputFoto.value = item.fotoUrl || "";
            inputDescripcion.value = item.descripcion || "";

            formTitle.innerText = "Modificar Perfume Existente";
            btnSubmit.innerText = "Actualizar Registro";
            btnCancel.style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.amp_deletePerfume = function(id) {
            if (confirm("¿Estás plenamente seguro de eliminar esta fragancia del catálogo permanente?")) {
                remove(ref(db, `perfumes/${id}`)).catch(err => console.error(err));
            }
        };

        window.amp_quickStock = async function(id, cambio) {
            const targetRef = ref(db, `perfumes/${id}/stock`);
            try {
                await runTransaction(targetRef, (currentStock) => {
                    if (currentStock === null) return 0;
                    const nuevoStock = currentStock + cambio;
                    return nuevoStock < 0 ? 0 : nuevoStock;
                });
            } catch (err) {
                console.error(err);
            }
        };

        const searchBar = document.getElementById('admin-search-bar');
        const genreFilter = document.getElementById('admin-genre-filter');

        searchBar.addEventListener('input', (e) => {
            currentSearchQuery = e.target.value;
            renderFilteredInventory();
        });

        genreFilter.addEventListener('change', (e) => {
            currentGenreFilter = e.target.value;
            renderFilteredInventory();
        });

        btnCancel.addEventListener('click', resetearFormulario);

        function resetearFormulario() {
            currentEditingId = null;
            perfumeForm.reset();
            formTitle.innerText = "Agregar Nuevo Perfume";
            btnSubmit.innerText = "Guardar Perfume";
            btnCancel.style.display = "none";
        }
    </script>
</body>
</html>
